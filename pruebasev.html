<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos - Guía Local Dolores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --accent-ad: #f59e0b;
      --accent-ad-bg: #fef3c7;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
      padding-bottom: 40px;
    }

    /* Header */
    header {
      background: #1e293b;
      color: #ffffff;
      padding: 24px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    header p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* Controls & Filters */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      background: var(--card-bg);
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
    }

    .search-box {
      flex: 1 1 250px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--primary);
    }

    .filter-select {
      flex: 0 1 180px;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: #fff;
      font-size: 0.95rem;
      color: var(--text-main);
      outline: none;
      cursor: pointer;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 20px;
    }

    /* Event Card */
    .event-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .event-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .event-img-wrap {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background-color: #e2e8f0;
      position: relative;
    }

    .event-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .event-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(15, 23, 42, 0.85);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    .event-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .event-date {
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .event-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .event-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Ad / Banner Card */
    .ad-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 2px solid #fef3c7;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
      background: linear-gradient(180deg, #ffffff 0%, #fffbeb 100%);
    }

    .ad-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--accent-ad);
      color: #ffffff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      z-index: 5;
      letter-spacing: 0.05em;
    }

    .ad-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background-color: #f1f5f9;
    }

    .ad-video {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
    }

    .ad-video iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .ad-play {
      background: #dc2626;
      color: #fff;
      border: none;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .ad-play:hover {
      background: #b91c1c;
    }

    .ad-play:disabled {
      background: #94a3b8;
      cursor: default;
    }

    .ad-cta {
      margin: auto 16px 16px 16px;
      padding: 12px;
      background: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
      text-decoration: none;
      display: block;
      margin-top: 12px;
    }

    .ad-cta:hover {
      background: var(--primary-hover);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-card {
      background: #fff;
      border-radius: var(--radius);
      max-width: 550px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .modal-body {
      padding: 20px;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <h1>Agenda de Eventos</h1>
    <p>Guía Local Dolores - Descubrí los mejores eventos de la ciudad</p>
  </header>

  <div class="container">
    <!-- Filtros de búsqueda -->
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por evento, artista o lugar...">
      </div>
      <select id="categoryFilter" class="filter-select">
        <option value="ALL">Todas las Categorías</option>
        <option value="Música">Música</option>
        <option value="Teatro">Teatro</option>
        <option value="Fiestas">Fiestas</option>
        <option value="Gastronomía">Gastronomía</option>
        <option value="Deportes">Deportes</option>
      </select>
    </div>

    <!-- Contenedor Principal de Eventos y Banners -->
    <div id="eventsContainer" class="grid">
      <!-- Los eventos y anuncios se insertan dinámicamente aquí -->
    </div>
  </div>

  <!-- Modal para Detalle de Evento -->
  <div id="eventModal" class="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" id="modalCloseBtn">&times;</button>
      <img id="modalImg" class="modal-img" src="" alt="Evento">
      <div class="modal-body">
        <div id="modalCategory" class="event-date"></div>
        <h2 id="modalTitle" style="margin-bottom: 8px;"></h2>
        <div id="modalDate" style="font-weight: 600; color: var(--text-muted); margin-bottom: 12px;"></div>
        <p id="modalDesc" style="color: var(--text-main); margin-bottom: 20px; white-space: pre-line;"></p>
        <div id="modalLocation" style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px;"></div>
        <a id="modalCta" href="#" target="_blank" class="ad-cta" style="margin: 0; text-align: center;">Más información</a>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. CONFIGURACIÓN Y ESTRUCTURA DE BANNERS
    // ==========================================
    
    // Arreglo unificado de banners (misma estructura que 'comercial')
    const banners = [
      { url: "https://www.guialocaldolores.com.ar/fuego-libre/", img: "https://res.cloudinary.com/dw3oovvb1/image/upload/v1761317401/v49zp00ozrcwq6trzuvq.png", cta: "https://www.guialocaldolores.com.ar/fuego-libre" },
      { media: "https://youtube.com/shorts/Cym2V9muLGQ?feature=share", poster: "https://via.placeholder.com/320x180.png?text=Poster+Video", cta: "https://www.guialocaldolores.com.ar/fuego-libre" },
      { media: "https://youtube.com/shorts/XBJOogweSiE", poster: "https://via.placeholder.com/320x180.png?text=Poster+Video", cta: "https://www.guialocaldolores.com.ar/fuego-libre" },
      { media: "https://youtube.com/shorts/cS6hG2KoXVI?feature=share", poster: "https://via.placeholder.com/320x180.png?text=Poster+Video", cta: "https://www.guialocaldolores.com.ar/fuego-libre" },
      { url: "https://www.guialocaldolores.com.ar/fuego-libre/", img: "https://res.cloudinary.com/dw3oovvb1/image/upload/v1761317400/wmxljnky7smtuxmecf4i.png", cta: "https://www.guialocaldolores.com.ar/fuego-libre" }
    ];

    // Alias para mantener compatibilidad interna total
    const AD_BANNERS = banners;

    // ==========================================
    // 2. DATOS DE EJEMPLO DE EVENTOS
    // ==========================================
    const SAMPLE_EVENTS = [
      {
        id: "1",
        title: "Festival de Canto y Danza Local",
        category: "Música",
        date: "Sábado 15 de Noviembre - 20:00 hs",
        location: "Plaza Castelli, Dolores",
        description: "Gran festival folklórico al aire libre con la participación de artistas regionales, danza en vivo y paseo gastronómico.",
        image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=600&auto=format&fit=crop&q=80",
        link: "https://www.guialocaldolores.com.ar"
      },
      {
        id: "2",
        title: "Noche de Teatro: Comedia de Verano",
        category: "Teatro",
        date: "Viernes 21 de Noviembre - 21:30 hs",
        location: "Teatro Unione, Dolores",
        description: "Una divertida obra teatral para toda la familia. Entradas anticipadas en boletería del teatro.",
        image: "https://images.unsplash.com/photo-1507676184212-d03ab07a01bf?w=600&auto=format&fit=crop&q=80",
        link: "https://www.guialocaldolores.com.ar"
      },
      {
        id: "3",
        title: "Feria Gastronómica Sabores Dolores",
        category: "Gastronomía",
        date: "Sábado 22 y Domingo 23 - Desde las 12:00 hs",
        location: "Parque Libres del Sur",
        description: "Puestos de comida local, food trucks, cerveza artesanal y música en vivo durante todo el fin de semana.",
        image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600&auto=format&fit=crop&q=80",
        link: "https://www.guialocaldolores.com.ar"
      },
      {
        id: "4",
        title: "Fiesta Retro 80s & 90s",
        category: "Fiestas",
        date: "Sábado 29 de Noviembre - 23:59 hs",
        location: "Club Social Dolores",
        description: "Los mejores clásicos de las décadas doradas con DJ en vivo y sorpresas.",
        image: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600&auto=format&fit=crop&q=80",
        link: "https://www.guialocaldolores.com.ar"
      },
      {
        id: "5",
        title: "Maratón Aniversario Dolores 10K",
        category: "Deportes",
        date: "Domingo 7 de Diciembre - 08:30 hs",
        location: "Paseo de la Guitarra",
        description: "Carrera competitiva 10K y caminata participativa 3K. Inscripción previa en la web.",
        image: "https://images.unsplash.com/photo-1452626038306-9aae5e071dd3?w=600&auto=format&fit=crop&q=80",
        link: "https://www.guialocaldolores.com.ar"
      },
      {
        id: "6",
        title: "Recital Acústico al Atardecer",
        category: "Música",
        date: "Sábado 13 de Diciembre - 19:00 hs",
        location: "Anfiteatro del Lago",
        description: "Bandas locales presentan repertorios desenchufados con vista al lago.",
        image: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=600&auto=format&fit=crop&q=80",
        link: "https://www.guialocaldolores.com.ar"
      }
    ];

    // ==========================================
    // 3. FUNCIONES AUXILIARES
    // ==========================================

    function normalizeYouTubeId(url) {
      if (!url) return '';
      const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))([\w-]{11})/);
      return match ? match[1] : '';
    }

    function safeUrl(url) {
      if (!url) return '';
      let trimmed = url.trim();
      if (trimmed.startsWith('javascript:')) return '';
      if (!/^https?:\/\//i.test(trimmed)) {
        trimmed = 'https://' + trimmed;
      }
      return trimmed;
    }

    // ==========================================
    // 4. GENERACIÓN DE ELEMENTOS BANNER (AD)
    // ==========================================

    function createBannerAdElement(ad) {
      const el = document.createElement('div');
      el.className = 'ad-card';
      let mediaShown = false;

      const mediaUrl = ad.media || ad.videoUrl || '';
      const vidId = normalizeYouTubeId(mediaUrl);
      const targetUrl = safeUrl(ad.cta || ad.url);

      // Etiqueta de Publicidad
      const tag = document.createElement('span');
      tag.className = 'ad-tag';
      tag.textContent = 'Publicidad';
      el.appendChild(tag);

      // Lógica para Banners de Video / YouTube Shorts
      if (vidId || ad.type === 'youtube') {
        const thumb = document.createElement('img');
        thumb.className = 'ad-img';
        thumb.alt = 'Publicidad';
        thumb.loading = 'lazy';
        // Utiliza el poster de la hoja de banners o la miniatura por defecto de YouTube
        thumb.src = (ad.poster && ad.poster.trim()) ? ad.poster : `https://img.youtube.com/vi/${vidId}/hqdefault.jpg`;
        el.appendChild(thumb);

        const play = document.createElement('button');
        play.className = 'ad-play';
        play.type = 'button';
        play.innerHTML = '▶ Reproducir video';
        play.onclick = function() {
          if (mediaShown) return;
          mediaShown = true;
          thumb.remove();

          const origin = encodeURIComponent(window.location.origin || '');
          const vid = document.createElement('div');
          vid.className = 'ad-video';

          const iframe = document.createElement('iframe');
          iframe.src = `https://www.youtube.com/embed/${vidId}?enablejsapi=1&autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1&origin=${origin}`;
          iframe.loading = 'lazy';
          iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
          iframe.setAttribute('allowfullscreen', 'true');
          iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation');

          vid.appendChild(iframe);
          el.insertBefore(vid, play);

          play.textContent = 'Reproduciendo';
          play.disabled = true;
        };
        el.appendChild(play);
      } 
      // Lógica para Banners de Imagen Directa
      else if (ad.img) {
        const img = document.createElement('img');
        img.className = 'ad-img';
        img.alt = 'Publicidad';
        img.loading = 'lazy';
        img.referrerPolicy = 'no-referrer';
        img.src = ad.img;
        el.appendChild(img);
      }

      // Botón CTA (Call to Action)
      const btn = document.createElement('button');
      btn.className = 'ad-cta';
      btn.type = 'button';
      btn.textContent = 'Visitar anunciante';
      btn.onclick = function() {
        if (!targetUrl) return;
        window.open(targetUrl, '_blank', 'noopener');
      };

      el.appendChild(btn);
      return el;
    }

    // ==========================================
    // 5. GENERACIÓN DE CARDS DE EVENTOS
    // ==========================================

    function createEventElement(event) {
      const el = document.createElement('div');
      el.className = 'event-card';

      el.innerHTML = `
        <div class="event-img-wrap">
          <img class="event-img" src="${event.image || 'https://via.placeholder.com/400x200?text=Evento'}" alt="${event.title}" loading="lazy">
          <span class="event-badge">${event.category || 'General'}</span>
        </div>
        <div class="event-content">
          <div class="event-date">${event.date || ''}</div>
          <h3 class="event-title">${event.title || 'Evento'}</h3>
          <p class="event-desc">${event.description || ''}</p>
          <div class="event-meta">
            <span>📍 ${event.location || 'Dolores'}</span>
            <span style="color: var(--primary); font-weight: 600; cursor: pointer;">Ver más &rarr;</span>
          </div>
        </div>
      `;

      el.onclick = function() {
        openModal(event);
      };

      return el;
    }

    // ==========================================
    // 6. RENDERIZADO Y MEZCLA DE EVENTOS Y BANNERS
    // ==========================================

    function renderEventsAndBanners(eventsList) {
      const container = document.getElementById('eventsContainer');
      container.innerHTML = '';

      if (!eventsList || eventsList.length === 0) {
        container.innerHTML = '<div class="no-results">No se encontraron eventos para esta búsqueda.</div>';
        return;
      }

      let bannerIndex = 0;
      const bannerFrequency = 2; // Inserta 1 banner cada 2 eventos

      eventsList.forEach((event, idx) => {
        // Insertar tarjeta de evento
        container.appendChild(createEventElement(event));

        // Insertar tarjeta de publicidad periódicamente si hay banners disponibles
        if ((idx + 1) % bannerFrequency === 0 && banners.length > 0) {
          const currentBanner = banners[bannerIndex % banners.length];
          container.appendChild(createBannerAdElement(currentBanner));
          bannerIndex++;
        }
      });
    }

    // ==========================================
    // 7. MODAL Y NAVEGACIÓN
    // ==========================================

    const modal = document.getElementById('eventModal');
    const closeBtn = document.getElementById('modalCloseBtn');

    function openModal(event) {
      document.getElementById('modalImg').src = event.image || 'https://via.placeholder.com/600x300?text=Evento';
      document.getElementById('modalTitle').textContent = event.title;
      document.getElementById('modalCategory').textContent = event.category;
      document.getElementById('modalDate').textContent = event.date;
      document.getElementById('modalDesc').textContent = event.description;
      document.getElementById('modalLocation').textContent = '📍 Lugar: ' + (event.location || 'Dolores');
      
      const ctaBtn = document.getElementById('modalCta');
      if (event.link) {
        ctaBtn.href = safeUrl(event.link);
        ctaBtn.style.display = 'block';
      } else {
        ctaBtn.style.display = 'none';
      }

      modal.classList.add('active');
    }

    closeBtn.onclick = function() {
      modal.classList.remove('active');
    };

    modal.onclick = function(e) {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    };

    // ==========================================
    // 8. FILTRADO Y BÚSQUEDA
    // ==========================================

    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');

    function filterEvents() {
      const query = searchInput.value.toLowerCase().trim();
      const selectedCategory = categoryFilter.value;

      const filtered = SAMPLE_EVENTS.filter(ev => {
        const matchesCategory = (selectedCategory === 'ALL') || (ev.category === selectedCategory);
        const matchesQuery = !query || 
          ev.title.toLowerCase().includes(query) || 
          ev.description.toLowerCase().includes(query) || 
          (ev.location && ev.location.toLowerCase().includes(query));

        return matchesCategory && matchesQuery;
      });

      renderEventsAndBanners(filtered);
    }

    searchInput.addEventListener('input', filterEvents);
    categoryFilter.addEventListener('change', filterEvents);

    // Inicializar renderizado
    renderEventsAndBanners(SAMPLE_EVENTS);
  </script>
</body>
</html>
